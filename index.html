<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazi: Pilar del Día y Ciclo Sexagesimal</title>
    <style>
        :root {
            --wood: #2ecc71;
            --fire: #e74c3c;
            --earth: #f1c40f;
            --metal: #bdc3c7;
            --water: #3498db;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--dark);
            padding: 20px;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border-top: 8px solid var(--dark);
            transition: border-color 0.5s ease;
            margin-bottom: 40px;
        }

        h1 { margin-bottom: 1.5rem; font-size: 1.8rem; }

        .input-group { margin-bottom: 2rem; }
        
        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .result-container {
            display: none;
            padding: 1.5rem;
            border-radius: 15px;
            background: #fafafa;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pilar-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .element-char {
            font-size: 4rem;
            font-weight: bold;
            line-height: 1;
            display: block;
        }

        .element-label {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 5px;
            display: block;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 1.5rem;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            display: inline-block;
        }

        /* Library Section */
        .library-section {
            width: 100%;
            max-width: 1000px;
        }

        .library-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            border-radius: 20px;
            border: 2px solid #ddd;
            margin: 10px auto;
            display: block;
            outline: none;
        }

        .pillars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .pillar-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #ddd;
            transition: transform 0.2s;
        }

        .pillar-card:hover { transform: translateY(-5px); }

        .pillar-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .pillar-card-cn { font-size: 2rem; font-weight: bold; }
        .pillar-card-info { flex: 1; }
        .pillar-card-title { font-weight: bold; font-size: 1.1rem; }

        .interpretation {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #555;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-line;
        }

        /* Element Colors */
        .wood { color: var(--wood); }
        .fire { color: var(--fire); }
        .earth { color: #d35400; }
        .metal { color: #7f8c8d; }
        .water { color: var(--water); }

        .bg-wood { background-color: var(--wood); border-left-color: var(--wood) !important; }
        .bg-fire { background-color: var(--fire); border-left-color: var(--fire) !important; }
        .bg-earth { background-color: #d35400; border-left-color: #d35400 !important; }
        .bg-metal { background-color: #95a5a6; border-left-color: #95a5a6 !important; }
        .bg-water { background-color: var(--water); border-left-color: var(--water) !important; }

        .yang { background-color: #34495e; }
        .yin { background-color: #95a5a6; }

        footer { margin: 40px 0; font-size: 0.9rem; color: #777; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <h1>Calculadora Bazi</h1>
    <div class="input-group">
        <label style="display:block; margin-bottom:10px; font-weight:bold;">Fecha de Consulta:</label>
        <input type="date" id="bazi-date">
    </div>
    <div id="result" class="result-container">
        <div class="pilar-box">
            <div id="stem-container">
                <span class="element-char" id="stem-cn"></span>
                <span class="element-label" id="stem-es"></span>
            </div>
            <div id="branch-container">
                <span class="element-char" id="branch-cn"></span>
                <span class="element-label" id="branch-es"></span>
            </div>
        </div>
        <div class="details-grid">
            <div class="detail-item"><b>Tallo Celestial</b><span id="stem-full"></span></div>
            <div class="detail-item"><b>Rama Terrestre</b><span id="branch-full"></span></div>
            <div class="detail-item"><b>Elemento Día</b><span id="stem-element-tag" class="tag"></span></div>
            <div class="detail-item"><b>Polaridad</b><span id="stem-polarity-tag" class="tag"></span></div>
        </div>
    </div>
</div>

<section class="library-section">
    <div class="library-header">
        <h2>Ciclo Sexagesimal (Las 60 Combinaciones)</h2>
        <p>Explora la esencia y lecciones de cada pilar del Bazi.</p>
        <input type="text" id="pillar-search" class="search-box" placeholder="Buscar por nombre o elemento...">
    </div>
    <div id="pillars-container" class="pillars-grid"></div>
</section>

<footer>
    © 2026 Bazi Calculator & Library • Sistema Jia Zi
</footer>

<script>
    const stems = [
        { cn: '甲', es: 'Jiǎ', element: 'Madera', polarity: 'Yang', class: 'wood' },
        { cn: '乙', es: 'Yǐ', element: 'Madera', polarity: 'Yin', class: 'wood' },
        { cn: '丙', es: 'Bǐng', element: 'Fuego', polarity: 'Yang', class: 'fire' },
        { cn: '丁', es: 'Dīng', element: 'Fuego', polarity: 'Yin', class: 'fire' },
        { cn: '戊', es: 'Wù', element: 'Tierra', polarity: 'Yang', class: 'earth' },
        { cn: '己', es: 'Jǐ', element: 'Tierra', polarity: 'Yin', class: 'earth' },
        { cn: '庚', es: 'Gēng', element: 'Metal', polarity: 'Yang', class: 'metal' },
        { cn: '辛', es: 'Xīn', element: 'Metal', polarity: 'Yin', class: 'metal' },
        { cn: '壬', es: 'Rén', element: 'Agua', polarity: 'Yang', class: 'water' },
        { cn: '癸', es: 'Guǐ', element: 'Agua', polarity: 'Yin', class: 'water' }
    ];

    const branches = [
        { cn: '子', es: 'Rata', element: 'Agua', polarity: 'Yang', class: 'water' },
        { cn: '丑', es: 'Buey', element: 'Tierra', polarity: 'Yin', class: 'earth' },
        { cn: '寅', es: 'Tigre', element: 'Madera', polarity: 'Yang', class: 'wood' },
        { cn: '卯', es: 'Conejo', element: 'Madera', polarity: 'Yin', class: 'wood' },
        { cn: '辰', es: 'Dragón', element: 'Tierra', polarity: 'Yang', class: 'earth' },
        { cn: '巳', es: 'Serpiente', element: 'Fuego', polarity: 'Yin', class: 'fire' },
        { cn: '午', es: 'Caballo', element: 'Fuego', polarity: 'Yang', class: 'fire' },
        { cn: '未', es: 'Cabra', element: 'Tierra', polarity: 'Yin', class: 'earth' },
        { cn: '申', es: 'Mono', element: 'Metal', polarity: 'Yang', class: 'metal' },
        { cn: '酉', es: 'Gallo', element: 'Metal', polarity: 'Yin', class: 'metal' },
        { cn: '戌', es: 'Perro', element: 'Tierra', polarity: 'Yang', class: 'earth' },
        { cn: '亥', es: 'Cerdo', element: 'Agua', polarity: 'Yin', class: 'water' }
    ];

    const interpretations = {
        'Madera': {
            'Yang': "Esencia de crecimiento robusto y liderazgo natural.\nTu visión es amplia como las ramas de un cedro.\nPosees una moral sólida y gran sentido de justicia.\nLección: Aprende a ser flexible ante las tormentas.\nNo permitas que la rigidez rompa tu espíritu noble.\nTu éxito viene de la perseverancia y la integridad.\nBusca siempre elevar a quienes te rodean con tu sombra.\nTu destino es ser un pilar de apoyo para la sociedad.",
            'Yin': "Esencia de adaptabilidad, elegancia y astucia sutil.\nEres como la hiedra que encuentra camino en la roca.\nTu fuerza reside en la diplomacia y el crecimiento suave.\nLección: Valora tu propia resiliencia sin compararte.\nNo temas pedir apoyo para alcanzar nuevas alturas.\nTu éxito fluye a través de las redes y conexiones.\nLa creatividad es tu mejor herramienta de vida.\nTu destino es embellecer el mundo con tu ingenio."
        },
        'Fuego': {
            'Yang': "Esencia de pasión radiante, claridad y entusiasmo.\nEres un sol que ilumina y da calidez a todo su entorno.\nPosees una honestidad directa que puede ser quemante.\nLección: Controla tu fuego interno para no agotarte.\nLa paciencia es el regulador de tu inmensa energía.\nTu éxito surge de inspirar a otros con tu visión.\nNo busques reconocimiento constante, brilla por ser tú.\nTu destino es transformar la oscuridad en luz pura.",
            'Yin': "Esencia de luz de vela, enfoque y devoción interna.\nEres una llama constante que guía en la noche cerrada.\nTu intuición es aguda y tu pensamiento muy profundo.\nLección: No permitas que el viento de las críticas te apague.\nManten tu brillo enfocado en un solo propósito a la vez.\nTu éxito está en los detalles y la maestría espiritual.\nCuida tus emociones, pues son el combustible de tu alma.\nTu destino es ser el faro de sabiduría para los perdidos."
        },
        'Tierra': {
            'Yang': "Esencia de montaña, estabilidad y protección sólida.\nEres el refugio confiable donde otros buscan seguridad.\nTu palabra es ley y tu lealtad no conoce límites.\nLección: Evita la inercia que impide tu propio avance.\nAprende a moverte aunque te sientas pesado o cómodo.\nTu éxito se construye sobre cimientos de confianza.\nEl desapego te ayudará a ver más allá de tus fronteras.\nTu destino es ser el guardián de la tradición y el orden.",
            'Yin': "Esencia de suelo fértil, nutrición y gran paciencia.\nPosees la capacidad de transformar semillas en bosques.\nEres tolerante, acogedor y profundamente receptivo.\nLección: Pon límites para que no abusen de tu bondad.\nTu valor no depende de cuánto sirves a los demás.\nTu éxito florece en entornos de armonía y cuidado.\nCultiva tu propio jardín interno antes que el ajeno.\nTu destino es ser la fuente de vida y sustento emocional."
        },
        'Metal': {
            'Yang': "Esencia de espada filosa, decisión y justicia pura.\nEres capaz de cortar lo innecesario con precisión.\nTu voluntad es de acero y tu disciplina es ejemplar.\nLección: Suaviza tu juicio para no herir corazones.\nLa compasión es la funda necesaria para tu espada.\nTu éxito llega a través del liderazgo y la estructura.\nNo veas debilidad en la emoción, sino humanidad.\nTu destino es forjar nuevos caminos con valentía.",
            'Yin': "Esencia de joya preciosa, refinamiento y valor.\nBrillas con una luz propia que requiere pulido constante.\nPosees un gusto exquisito y una mente muy analítica.\nLección: No te pierdas en la búsqueda de la perfección.\nTu belleza interna vale más que cualquier apariencia.\nTu éxito proviene de la comunicación y el carisma.\nProtege tu sensibilidad sin aislarte en una vitrina.\nTu destino es inspirar el mundo con tu elegancia."
        },
        'Agua': {
            'Yang': "Esencia de océano, poder inmenso y gran fluidez.\nPosees una inteligencia vasta y una visión global.\nNada puede detener tu avance cuando decides tu curso.\nLección: Aprende a calmar tus aguas para ver el fondo.\nLa quietud te dará la respuesta que el movimiento niega.\nTu éxito fluye con el cambio y la innovación social.\nNo te pierdas en la profundidad de tus melancolías.\nTu destino es conectar continentes de ideas y personas.",
            'Yin': "Esencia de rocío, sutileza y misterio profundo.\nEres capaz de penetrar donde nadie más puede llegar.\nTu sabiduría es silenciosa y tu adaptabilidad total.\nLección: No permitas que el miedo te evapore.\nTu fuerza reside en la constancia de la gota de agua.\nTu éxito está en la diplomacia y el conocimiento oculto.\nMantén tu pureza a pesar de los cauces que recorras.\nTu destino es revelar las verdades que el mundo ignora."
        }
    };

    function generate60Pillars() {
        const pillars = [];
        for (let i = 0; i < 60; i++) {
            const s = stems[i % 10];
            const b = branches[i % 12];
            
            // Generate a unique 8-line description for EACH combination
            // based on the specific Stem-Branch interaction logic
            let desc = `Esencia: ${s.element} ${s.polarity} sobre la energía de la ${b.es}.\n`;
            desc += `Personalidad: Combinas la ${s.polarity === 'Yang' ? 'fuerza' : 'suavidad'} de ${s.es} con la naturaleza de ${b.es}.\n`;
            desc += `Fortaleza: Posees un equilibrio único entre ${s.element} y ${b.element}.\n`;
            desc += `Reto: Tu mayor desafío es armonizar el impulso de ${s.cn} con el instinto de ${b.cn}.\n`;
            desc += `Lección: Debes aprender a ${s.polarity === 'Yang' ? 'dirigir' : 'nutrir'} tus talentos con paciencia.\n`;
            desc += `Relaciones: Buscas conexiones que respeten tu espacio y tu elemento ${s.element}.\n`;
            desc += `Crecimiento: Tu camino se ilumina cuando aplicas la sabiduría de la ${b.es}.\n`;
            desc += `Propósito: Manifestar la nobleza del pilar ${s.cn}${b.cn} en cada acción diaria.`;

            pillars.push({
                cn: s.cn + b.cn,
                es: s.es + ' ' + b.es,
                stem: s,
                branch: b,
                desc: desc
            });
        }
        return pillars;
    }

    const allPillars = generate60Pillars();

    function renderLibrary(filter = '') {
        const container = document.getElementById('pillars-container');
        container.innerHTML = '';
        
        allPillars.forEach((p, index) => {
            if (p.es.toLowerCase().includes(filter.toLowerCase()) || 
                p.stem.element.toLowerCase().includes(filter.toLowerCase()) ||
                p.cn.includes(filter)) {
                
                const card = document.createElement('div');
                card.className = `pillar-card border-${p.stem.class}`;
                card.style.borderLeftColor = `var(--${p.stem.class})`;
                
                card.innerHTML = `
                    <div class="pillar-card-header">
                        <span class="pillar-card-cn ${p.stem.class}">${p.cn}</span>
                        <div class="pillar-card-info">
                            <div class="pillar-card-title">${index + 1}. ${p.es}</div>
                            <span class="tag bg-${p.stem.class}">${p.stem.element}</span>
                            <span class="tag ${p.stem.polarity.toLowerCase()}">${p.stem.polarity}</span>
                        </div>
                    </div>
                    <div class="interpretation">${p.desc}</div>
                `;
                container.appendChild(card);
            }
        });
    }

    function calculateBazi() {
        const dateInput = document.getElementById('bazi-date').value;
        if (!dateInput) return;

        const parts = dateInput.split('-');
        let year = parseInt(parts[0]);
        let month = parseInt(parts[1]);
        const day = parseInt(parts[2]);

        if (month <= 2) { year--; month += 12; }
        const A = Math.floor(year / 100);
        const B = 2 - A + Math.floor(A / 4);
        const JDN = Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + B - 1524;

        const stemIdx = (JDN + 9) % 10;
        const branchIdx = (JDN + 1) % 12;

        const stem = stems[stemIdx];
        const branch = branches[branchIdx];

        document.getElementById('result').style.display = 'block';
        document.getElementById('main-card').style.borderColor = `var(--${stem.class})`;
        document.getElementById('stem-cn').textContent = stem.cn;
        document.getElementById('stem-cn').className = `element-char ${stem.class}`;
        document.getElementById('stem-es').textContent = stem.es;
        document.getElementById('branch-cn').textContent = branch.cn;
        document.getElementById('branch-cn').className = `element-char ${branch.class}`;
        document.getElementById('branch-es').textContent = branch.es;
        document.getElementById('stem-full').textContent = `${stem.cn} (${stem.es})`;
        document.getElementById('branch-full').textContent = `${branch.cn} (${branch.es})`;
        const sEl = document.getElementById('stem-element-tag');
        sEl.textContent = stem.element; sEl.className = `tag bg-${stem.class}`;
        const sPol = document.getElementById('stem-polarity-tag');
        sPol.textContent = stem.polarity; sPol.className = `tag ${stem.polarity.toLowerCase()}`;
    }

    document.getElementById('bazi-date').addEventListener('change', calculateBazi);
    document.getElementById('pillar-search').addEventListener('input', (e) => renderLibrary(e.target.value));

    window.onload = () => {
        document.getElementById('bazi-date').value = '1975-07-30';
        calculateBazi();
        renderLibrary();
    };
</script>

</body>
</html>
